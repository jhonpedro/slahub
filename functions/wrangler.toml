name = "slahub-slack-handler"
main = "slack-interaction-handler.js"
compatibility_date = "2024-01-01"

[vars]
GITHUB_REPO = "your-org/slahub"  # Change to your actual repo

# Secrets are NOT stored here — set them via CLI:
#   wrangler secret put SLACK_SIGNING_SECRET
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put ANTHROPIC_API_KEY
