<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlaHub Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
    }
    .counter-container {
      text-align: center;
      padding: 3rem;
      background: #1e293b;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; color: #94a3b8; }
    #count {
      font-size: 5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      font-variant-numeric: tabular-nums;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.75rem 2.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #add-btn {
      background: #3b82f6;
      color: white;
    }
    #add-btn:hover { background: #2563eb; }
    #add-btn:active { background: #1d4ed8; }
    #reset-btn {
      background: #ef4444;
      color: white;
    }
    #reset-btn:hover { background: #dc2626; }
    #reset-btn:active { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="counter-container">
    <h1>SlaHub Counter</h1>
    <div id="count">0</div>
    <div class="button-group">
      <button id="add-btn">Add +1</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>
  <script src="counter.js"></script>
</body>
</html>
